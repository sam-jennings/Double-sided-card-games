<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- ============================================================
       DOUBLE-SIDED · Sign glyphs (geometric prototyping set)
       ------------------------------------------------------------
       Nine simple, bold, single-colour shapes — one per sign, in
       pip order. They fill/stroke with `currentColor`, so set the
       colour on the parent (e.g. via a `sign-<name>` class).

       These are PLACEHOLDER glyphs in the spirit of the project's
       "Set D Glyphs" accessibility benchmark (see deck-structure.md).
       Swap in the final illustrated card art when it exists.

       Use:  <svg><use href="glyphs.svg#sign-crown"></use></svg>
       (For file:// previews, inline this sprite — see starter.html.)
       ============================================================ -->

  <symbol id="sign-moon" viewBox="0 0 100 100">
    <path fill-rule="evenodd" d="M50 50 m-36 0 a36 36 0 1 0 72 0 a36 36 0 1 0 -72 0 Z M58 50 m-28 0 a28 28 0 1 0 56 0 a28 28 0 1 0 -56 0 Z" fill="currentColor"/>
  </symbol>

  <symbol id="sign-leaf" viewBox="0 0 100 100">
    <path d="M50 12 C70 30 70 56 50 80 C30 56 30 30 50 12 Z" fill="currentColor"/>
    <rect x="48" y="76" width="4" height="12" rx="2" fill="currentColor"/>
  </symbol>

  <symbol id="sign-wave" viewBox="0 0 100 100">
    <path d="M14 56 Q32 32 50 56 T86 56" fill="none" stroke="currentColor" stroke-width="11" stroke-linecap="round"/>
  </symbol>

  <symbol id="sign-flame" viewBox="0 0 100 100">
    <path fill-rule="evenodd" d="M54 6 C48 30 30 36 30 60 C30 78 42 94 54 94 C69 94 77 78 71 60 C67 48 56 50 59 35 C61 26 58 16 54 6 Z M53 52 C51 61 45 65 45 73 C45 81 49 85 54 85 C60 85 63 79 61 72 C59 64 55 63 53 52 Z" fill="currentColor"/>
  </symbol>

  <symbol id="sign-eye" viewBox="0 0 100 100">
    <path d="M12 50 Q50 18 88 50 Q50 82 12 50 Z" fill="none" stroke="currentColor" stroke-width="9"/>
    <circle cx="50" cy="50" r="12" fill="currentColor"/>
  </symbol>

  <symbol id="sign-mask" viewBox="0 0 100 100">
    <path fill-rule="evenodd" d="M14 40 C24 30 40 30 50 37 C60 30 76 30 86 40 C88 53 79 63 65 64 C57 65 52 59 50 53 C48 59 43 65 35 64 C21 63 12 53 14 40 Z M33 47 m-9 0 a9 6 0 1 0 18 0 a9 6 0 1 0 -18 0 Z M67 47 m-9 0 a9 6 0 1 0 18 0 a9 6 0 1 0 -18 0 Z" fill="currentColor"/>
  </symbol>

  <symbol id="sign-key" viewBox="0 0 100 100">
    <circle cx="50" cy="30" r="16" fill="none" stroke="currentColor" stroke-width="10"/>
    <rect x="45" y="44" width="10" height="42" fill="currentColor"/>
    <rect x="55" y="66" width="15" height="9" fill="currentColor"/>
  </symbol>

  <symbol id="sign-star" viewBox="0 0 100 100">
    <path d="M50 14 L61 39 L88 42 L67 60 L74 87 L50 72 L26 87 L33 60 L12 42 L39 39 Z" fill="currentColor"/>
  </symbol>

  <symbol id="sign-crown" viewBox="0 0 100 100">
    <path d="M18 74 L18 38 L35 53 L50 30 L65 53 L82 38 L82 74 Z" fill="currentColor"/>
  </symbol>
</svg>
